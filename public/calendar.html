<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendario de turnos</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fcfbf8;
      --bg-soft: #f4efe7;
      --panel: #ffffff;
      --panel-soft: #faf7f2;
      --text: #111111;
      --muted: #666055;
      --line: #d9d2c8;
      --green: #d7f0d8;
      --red: #f7d0cc;
      --shadow: 0 16px 34px rgba(17, 17, 17, 0.06);
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #111111;
      --bg-soft: #181818;
      --panel: #181818;
      --panel-soft: #202020;
      --text: #f5efe6;
      --muted: #b9b0a4;
      --line: #3f3a35;
      --green: #1c3c25;
      --red: #472626;
      --shadow: none;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--text);
    }
    button, select { font: inherit; }
    .page {
      max-width: 1360px;
      margin: 0 auto;
      padding: 0 28px 44px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 0 -28px;
      padding: 14px 28px;
      backdrop-filter: blur(8px);
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner, .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: space-between; }
    .topbar-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .brand { display: flex; gap: 10px; align-items: center; font-weight: 800; }
    .brand-mark {
      width: 12px; height: 12px; border-radius: 3px;
      background: linear-gradient(135deg, #ff7a18, #af002d 70%);
      box-shadow: 14px 0 0 0 #0ea5e9, 7px 10px 0 0 #22c55e;
      margin-right: 16px;
    }
    .button-link, .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
    }
    .button.primary, .button-link.primary { background: #111; color: #fff; border-color: #111; }
    body[data-theme="dark"] .button.primary, body[data-theme="dark"] .button-link.primary { background: #f5efe6; color: #111; border-color: #f5efe6; }
    .theme-toggle { width: 44px; min-width: 44px; padding: 0; font-size: 18px; }
    .hero { padding: 36px 0 20px; }
    .hero h1 { margin: 0 0 8px; font-size: clamp(36px, 6vw, 52px); }
    .meta { color: var(--muted); }
    .panel {
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .stat { padding: 14px; background: var(--panel-soft); border: 1px solid var(--line); }
    .stat strong { display: block; font-size: 24px; margin-top: 6px; }
    .calendar-grid {
      display: grid;
      grid-template-columns: 110px repeat(7, minmax(150px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
      overflow: auto;
    }
    .grid-cell {
      background: var(--panel);
      min-height: 66px;
      padding: 10px;
      font-size: 13px;
    }
    .grid-head { font-weight: 800; min-height: 72px; }
    .grid-time { color: var(--muted); font-weight: 700; }
    .slot-free { background: var(--green); }
    .slot-busy { background: var(--red); }
    .slot-title { font-weight: 700; margin-bottom: 4px; }
    .slot-time { color: var(--muted); font-size: 12px; }
    .empty-state { padding: 18px; border: 1px dashed var(--line); color: var(--muted); }
    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .calendar-grid { grid-template-columns: 90px repeat(7, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body data-theme="light">
  <main class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Centro de Atención</span>
        </div>
        <div class="topbar-actions">
          <a class="button-link" href="/admin" aria-label="Volver al panel" title="Volver al panel">← Volver al panel</a>
          <button id="themeToggle" class="button theme-toggle" type="button" aria-label="Cambiar tema" title="Cambiar tema">🌙</button>
        </div>
      </div>
    </header>

    <section class="hero">
      <h1>Calendario</h1>
      <p class="meta">Vista semanal de turnos tomados y espacios disponibles según Google Calendar.</p>
    </section>

    <section class="panel" style="margin-bottom: 18px;">
      <div class="toolbar">
        <div class="toolbar">
          <button id="reloadButton" class="button primary" type="button">Actualizar calendario</button>
          <select id="daysSelect" class="button" aria-label="Días a mostrar">
            <option value="5">5 días</option>
            <option value="7" selected>7 días</option>
            <option value="14">14 días</option>
          </select>
        </div>
        <div id="calendarMeta" class="meta"></div>
      </div>
    </section>

    <section id="stats" class="stats"></section>
    <section id="calendarContainer" class="panel"></section>
  </main>

  <script>
    const themeToggleEl = document.getElementById('themeToggle')
    const reloadButtonEl = document.getElementById('reloadButton')
    const daysSelectEl = document.getElementById('daysSelect')
    const calendarMetaEl = document.getElementById('calendarMeta')
    const statsEl = document.getElementById('stats')
    const calendarContainerEl = document.getElementById('calendarContainer')

    const storedTheme = localStorage.getItem('admin-theme') || 'light'
    document.body.dataset.theme = storedTheme
    updateThemeToggleIcon(storedTheme)

    function updateThemeToggleIcon(theme) {
      const isLight = theme === 'light'
      themeToggleEl.textContent = isLight ? '🌙' : '☀'
      themeToggleEl.title = isLight ? 'Activar modo noche' : 'Activar modo día'
      themeToggleEl.setAttribute('aria-label', themeToggleEl.title)
    }

    function escapeHtml(value) {
      return `${value ?? ''}`
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;')
    }

    function slotLabel(dateString) {
      const date = new Date(dateString)
      return date.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
    }

    function dayLabel(dateString) {
      const date = new Date(dateString)
      return date.toLocaleDateString('es-AR', { weekday: 'short', day: '2-digit', month: '2-digit' })
    }

    function apiJson(url) {
      return fetch(url).then(async (response) => {
        const payload = await response.json()
        if (!response.ok) throw new Error(payload.error || 'Error cargando calendario')
        return payload
      })
    }

    function renderStats(payload) {
      const freeCount = (payload.slots || []).filter((slot) => !slot.busy).length
      const busyCount = (payload.slots || []).filter((slot) => slot.busy).length
      const eventsCount = (payload.events || []).length
      statsEl.innerHTML = `
        <article class="stat"><div class="meta">Slots libres</div><strong>${freeCount}</strong></article>
        <article class="stat"><div class="meta">Slots ocupados</div><strong>${busyCount}</strong></article>
        <article class="stat"><div class="meta">Turnos agendados</div><strong>${eventsCount}</strong></article>
        <article class="stat"><div class="meta">Rango</div><strong>${payload.workStart} - ${payload.workEnd}</strong></article>
      `
    }

    function renderCalendar(payload) {
      if (!payload.configured) {
        calendarContainerEl.innerHTML = '<div class="empty-state">Google Calendar no está configurado.</div>'
        return
      }
      if (!payload.available) {
        calendarContainerEl.innerHTML = `<div class="empty-state">No se pudo cargar el calendario: ${escapeHtml(payload.error || 'desconocido')}</div>`
        return
      }

      const slots = payload.slots || []
      if (!slots.length) {
        calendarContainerEl.innerHTML = '<div class="empty-state">No hay slots para mostrar.</div>'
        return
      }

      const dayMap = new Map()
      const timeMap = new Map()
      const eventMap = new Map()

      for (const event of payload.events || []) {
        eventMap.set(`${event.start}|${event.end}`, event)
      }

      for (const slot of slots) {
        const start = new Date(slot.start)
        const dayKey = start.toLocaleDateString('en-CA')
        const timeKey = slotLabel(slot.start)
        if (!dayMap.has(dayKey)) dayMap.set(dayKey, { label: dayLabel(slot.start), slots: new Map() })
        dayMap.get(dayKey).slots.set(timeKey, slot)
        timeMap.set(timeKey, true)
      }

      const days = [...dayMap.entries()]
      const times = [...timeMap.keys()].sort((a, b) => a.localeCompare(b))
      const cells = ['<div class="grid-cell grid-head"></div>']

      for (const [, day] of days) {
        cells.push(`<div class="grid-cell grid-head">${escapeHtml(day.label)}</div>`)
      }

      for (const time of times) {
        cells.push(`<div class="grid-cell grid-time">${escapeHtml(time)}</div>`)
        for (const [, day] of days) {
          const slot = day.slots.get(time)
          if (!slot) {
            cells.push('<div class="grid-cell"></div>')
            continue
          }
          const cls = slot.busy ? 'grid-cell slot-busy' : 'grid-cell slot-free'
          const event = eventMap.get(`${slot.start}|${slot.end}`)
          const title = slot.busy ? (event?.summary || 'Ocupado') : 'Disponible'
          const timeRange = `${slotLabel(slot.start)} - ${slotLabel(slot.end)}`
          cells.push(`<div class="${cls}"><div class="slot-title">${escapeHtml(title)}</div><div class="slot-time">${escapeHtml(timeRange)}</div></div>`)
        }
      }

      calendarContainerEl.innerHTML = `<div class="calendar-grid">${cells.join('')}</div>`
      calendarMetaEl.textContent = `Slots de ${payload.slotMinutes} min`
    }

    async function loadCalendar() {
      reloadButtonEl.disabled = true
      reloadButtonEl.textContent = 'Actualizando...'
      try {
        const payload = await apiJson(`/api/calendar/overview?days=${encodeURIComponent(daysSelectEl.value)}`)
        renderStats(payload)
        renderCalendar(payload)
      } catch (error) {
        calendarContainerEl.innerHTML = `<div class="empty-state">${escapeHtml(error.message)}</div>`
      } finally {
        reloadButtonEl.disabled = false
        reloadButtonEl.textContent = 'Actualizar calendario'
      }
    }

    themeToggleEl.addEventListener('click', () => {
      const nextTheme = document.body.dataset.theme === 'light' ? 'dark' : 'light'
      document.body.dataset.theme = nextTheme
      localStorage.setItem('admin-theme', nextTheme)
      updateThemeToggleIcon(nextTheme)
    })

    reloadButtonEl.addEventListener('click', () => loadCalendar())
    daysSelectEl.addEventListener('change', () => loadCalendar())

    loadCalendar().catch(console.error)
  </script>
</body>
</html>
